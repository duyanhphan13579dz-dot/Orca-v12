<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="Orca Financial">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E4F9A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#08162F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body-grad" x1="60" y1="50" x2="140" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="55%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#0A2F6E"/>
    </linearGradient>
    <linearGradient id="belly-grad" x1="80" y1="110" x2="130" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E3EAF8"/>
    </linearGradient>
    <linearGradient id="fin-grad" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0A2F6E"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#F59F00"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0A2F6E" flood-opacity="0.35"/>
    </filter>
    <filter id="inner-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Subtle background glow -->
  <ellipse cx="100" cy="110" rx="78" ry="62" fill="url(#bg-glow)"/>

  <!-- ═══════════════ ORCA WHALE BODY ═══════════════ -->
  <!-- Main body — smooth tear-drop shape, swimming pose -->
  <g filter="url(#shadow)">
    <!-- Body -->
    <path d="
      M 155 82
      C 168 70, 172 90, 168 108
      C 162 130, 145 148, 122 158
      C 105 164, 88 162, 76 152
      C 60 138, 52 116, 56 96
      C 60 76, 74 60, 94 55
      C 110 51, 140 60, 155 82 Z
    " fill="url(#body-grad)"/>

    <!-- White belly patch — characteristic orca marking -->
    <path d="
      M 118 148
      C 108 158, 90 160, 78 150
      C 66 140, 62 122, 68 108
      C 74 96, 86 90, 100 92
      C 114 94, 124 106, 122 120
      C 120 132, 120 142, 118 148 Z
    " fill="url(#belly-grad)" opacity="0.95"/>

    <!-- White eye patch (orca characteristic) -->
    <ellipse cx="148" cy="85" rx="12" ry="9" fill="white" transform="rotate(-15 148 85)"/>

    <!-- Dorsal fin (tall, swept back) -->
    <path d="M 118 62 Q 132 32 148 44 Q 138 52 128 60 Q 124 62 118 62 Z" fill="url(#fin-grad)"/>

    <!-- Left pectoral fin -->
    <path d="M 68 112 Q 44 124 38 144 Q 52 130 68 118 Q 70 116 68 112 Z" fill="url(#fin-grad)" opacity="0.85"/>

    <!-- Tail fluke -->
    <path d="
      M 72 148
      Q 52 162 44 178
      Q 58 166 68 154
      Q 72 168 62 184
      Q 78 170 76 156
      Q 78 150 72 148 Z
    " fill="url(#fin-grad)"/>
  </g>

  <!-- Eye (main, on body) -->
  <circle cx="148" cy="84" r="5.5" fill="#0D1B3E"/>
  <circle cx="150" cy="82" r="1.8" fill="white" opacity="0.9"/>

  <!-- Smile / mouth curve -->
  <path d="M 134 96 Q 140 102 148 100" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- ═══════════════ GOLD ACCENT — Rising arrow ═══════════════ -->
  <path d="M 82 130 Q 96 112 114 92 Q 130 74 148 58"
        stroke="url(#gold-grad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Arrow head -->
  <polygon points="148,58 138,66 144,72" fill="#F59F00"/>

  <!-- ═══════════════ SPARKLE STARS ═══════════════ -->
  <!-- Star 1 -->
  <g transform="translate(162 58)" opacity="0.9">
    <path d="M0-9 L2-2 L9-2 L3 2 L5 9 L0 5 L-5 9 L-3 2 L-9-2 L-2-2 Z" fill="url(#gold-grad)" transform="scale(0.7)"/>
  </g>
  <!-- Star 2 (small) -->
  <g transform="translate(42 78)" opacity="0.7">
    <path d="M0-6 L1.5-1.5 L6-1.5 L2 1.5 L3.5 6 L0 3.5 L-3.5 6 L-2 1.5 L-6-1.5 L-1.5-1.5 Z" fill="#FFE082" transform="scale(0.6)"/>
  </g>
  <!-- Dot sparkles -->
  <circle cx="170" cy="72" r="3" fill="#FFE082" opacity="0.8"/>
  <circle cx="46" cy="90" r="2" fill="#FFE082" opacity="0.6"/>
  <circle cx="176" cy="92" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="40" cy="108" r="1.5" fill="#90CAF9" opacity="0.7"/>

  <!-- Water ripple (below whale, subtle) -->
  <ellipse cx="100" cy="178" rx="42" ry="7" fill="#1565C0" opacity="0.12"/>
  <ellipse cx="100" cy="182" rx="28" ry="4" fill="#1565C0" opacity="0.08"/>

  <!-- ═══════════════ STICKER BORDER (white outline) ═══════════════ -->
  <!-- This is achieved via the shadow + the white elements creating the sticker look -->
</svg>
